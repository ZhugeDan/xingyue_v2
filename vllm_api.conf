server {
    listen 8001; # 公网接待端口
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8080; # 转发给隐秘隧道
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 极度重要：关闭 Nginx 缓冲，保证打字机流式输出 (Stream) 顺畅
        proxy_buffering off; 
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
